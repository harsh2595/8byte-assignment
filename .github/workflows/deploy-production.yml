name: Deploy production

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: true
        default: main
      image_tag:
        description: Image tag to deploy, usually the staging commit SHA
        required: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  ECR_REPOSITORY: ${{ vars.PRODUCTION_ECR_REPOSITORY || '8byte-assignment-production-app' }}
  TF_WORKING_DIR: terraform/environments/production

jobs:
  deploy:
    name: Approved production deployment
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: app
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ inputs.image_tag }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.3

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform apply production
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -var="image_tag=${{ inputs.image_tag }}"

      - name: Smoke test
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          APP_URL="$(terraform output -raw application_url)"
          cd ../../..
          bash scripts/smoke-test.sh "${APP_URL}"

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Production deployment failed for ${GITHUB_REPOSITORY} image ${{ inputs.image_tag }}\"}" \
            "${SLACK_WEBHOOK_URL}"
